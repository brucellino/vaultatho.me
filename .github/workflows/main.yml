name: Release
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  actions: read
  contents: write
  deployments: none
  packages: write
  pages: none
  pull-requests: write
  security-events: write
  statuses: write

jobs:
  validate:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create dev env with jdx mise action
        uses: jdx/mise-action@v3
        with:
          install: true
          experimental: true
      - name: init terraform
        run: terraform init --backend=false
      - name: validate terraform
        run: terraform validate

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        vault_version:
          - 2.0.0 # latest
          - 1.21.4 # Current
          - 1.16.3 # Last
        nomad_version:
          - 2.0.0 # latest
          - 1.11.3 # Current
          - 1.10.5 # Last
        consul_version:
          - 1.22.7 # latest
          - 1.21.5 # Current
          - 1.16.6 # Last
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create dev env with jdx mise action
        uses: jdx/mise-action@v3
        with:
          install: true
          experimental: true
      - name: Get Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh
      - name: Start tailscale
        run: sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}"
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      - name: Get Consul
        run: mise install consul@${{ matrix.consul_version }}
      - name: Get Nomad
        run: mise install nomad@${{ matrix.nomad_version }}
      - name: Get Vault
        run: mise install vault@${{ matrix.vault_version }}
      - name: Start Consul dev server
        run: consul agent -dev &
      - name: Bootstrap consul ACL
        run: consul acl bootstrap -format=json
      - name: Start Nomad server
        run: nomad agent -dev -acl-enabled -bootstrap-expect=1 &
      - name: Bootstrap Nomad ACL
        run: nomad acl bootstrap -json > nomad_acl.json
      - name: Start Vault dev server
        run: vault server -dev &
      - name: init terraform
        run: terraform init
      - name: Plan
        run: |
          TF_VAR_nomad_mgmt_token=$(cat nomad_acl.json| jq -r .SecretID) \
          VAULT_TOKEN=$(cat ~/.vault-token) \
          TF_VAR_vault_addr=http://localhost:8200 \
          TF_VAR_consul_token=${{ secrets.CONSUL_TOKEN }} \
          terraform plan
        env:
          VAULT_ADDR: http://localhost:8200
          NOMAD_ADDR: http://localhost:4646
          CONSUL_HTTP_ADDR: http://localhost:8500
      # - name: stop Vault
      #   run: kill -9 $(jobs -p)
  release:
    needs: [apply]
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/iron'
      - name: Install dependencies
        run: |
          npm install -g \
            semantic-release \
            '@semantic-release/changelog' \
            '@semantic-release/github' \
            '@semantic-release/changelog' \
            '@semantic-release/git'
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
